<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="branch-bg" aria-hidden="true"></div>

    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow">Mergington High School</p>
        <h1>Extracurricular Activities</h1>
        <p class="hero-subtitle">
          Bright, lively, and ready for students to explore clubs, sports, and creative projects.
        </p>
      </div>

      <div class="hero-mascots" aria-label="GitHub mascots">
        <div class="mascot-card">
          <img
            src="https://octodex.github.com/images/original.png"
            alt="Octocat mascot"
          />
        </div>
        <div class="mascot-card mascot-card-tilt">
          <img
            src="https://octodex.github.com/images/collabocats.jpg"
            alt="Collabocats mascot"
          />
        </div>
        <div class="mascot-card">
          <img
            src="https://octodex.github.com/images/daftpunktocat-guy.gif"
            alt="Daftpunktocat mascot"
          />
        </div>
      </div>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Sign Up for an Activity</h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
